<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <title>GlassBlock</title>
  <defs>
    <linearGradient id="gb-block" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3A7BFF"/>
      <stop offset="1" stop-color="#16C6D4"/>
    </linearGradient>
  </defs>
  <!-- the block -->
  <rect x="16" y="16" width="96" height="96" rx="26" fill="url(#gb-block)"/>
  <!-- beveled inner edge: the thickness of the glass -->
  <rect x="27" y="27" width="74" height="74" rx="18" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.22"/>
  <!-- one confident light-bar across the glass (also reads as a blocking slash) -->
  <path d="M32 96 L96 32" stroke="#ffffff" stroke-width="9" stroke-linecap="round" opacity="0.92"/>
</svg>
